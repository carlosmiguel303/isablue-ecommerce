<div class="announcement">Envíos a todo el Perú · Compra protegida · Atención personalizada</div>
<nav class="navbar navbar-expand-lg sticky-top store-nav">
  <div class="container">
    <a class="brand" routerLink="/" aria-label="Isablue, inicio">
      <img class="brand-logo" src="assets/images/perfil.jpg" alt="Isablue Juguetes y Accesorios"><span><strong>ISABLUE</strong><small>JUGUETES Y ACCESORIOS</small></span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#storeMenu" aria-label="Abrir menú"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="storeMenu">
      <form class="search" (ngSubmit)="buscar()">
        <span aria-hidden="true">⌕</span><input name="q" [(ngModel)]="q" type="search" placeholder="¿Qué estás buscando?" aria-label="Buscar productos">
        <button type="submit">Buscar</button>
      </form>
      <ul class="navbar-nav ms-auto align-items-lg-center">
        <li><a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Inicio</a></li>
        <li><a class="nav-link" routerLink="/tienda" routerLinkActive="active">Tienda</a></li>
        <li *ngIf="isAdmin()"><a class="nav-link" routerLink="/admin/product">Administrar</a></li>
        <li *ngIf="!isLogged()"><a class="nav-link" routerLink="/user/login">Mi cuenta</a></li>
        <li><a class="cart-link" routerLink="/cart/sumary" aria-label="Ver carrito">🛒 <span>Carrito</span><b *ngIf="cartCount()">{{cartCount()}}</b></a></li>
        <li *ngIf="isLogged()"><button class="logout" (click)="logout()">Salir</button></li>
      </ul>
    </div>
  </div>
</nav>
