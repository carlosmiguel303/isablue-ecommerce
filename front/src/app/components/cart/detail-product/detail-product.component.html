<app-header-user></app-header-user>
<div class="container product-detail">
  <a [routerLink]="['/']" class="back-link">← Volver al catálogo</a>
  <div class="detail-card">
    <div class="detail-img"><img [src]="urlImage" [alt]="name" (error)="$any($event.target).src='assets/images/toy-teddy.svg'"></div>
    <div class="detail-info">
      <span class="tag">Producto tecnológico</span>
      <h1>{{name}}</h1>
      <p>{{description}}</p>
      <div class="price">S/ {{price}}</div>
      <label>Cantidad</label>
      <input class="form-control qty" type="number" [(ngModel)]="quantity" id="quantity" name="quantity" min="1" max="10">
      <button (click)="addCart(id)" class="btn btn-warning btn-lg mt-4">Añadir al carrito</button>
    </div>
  </div>
</div>
