<app-header-admin></app-header-admin>

<main class="admin-page">
  <div class="container">

    <section class="admin-hero">
      <div>
        <span class="admin-badge">Panel administrativo</span>
        <h1>Crear Producto IsaBlue</h1>
        <p>Registra juguetes, categorías, precios e imágenes para tu tienda online.</p>
      </div>

      <a routerLink="/admin/product" class="btn btn-outline-dark">
        Volver a productos
      </a>
    </section>

    <ol class="breadcrumb admin-breadcrumb">
      <li class="breadcrumb-item">
        <a routerLink="/admin/product">Productos</a>
      </li>
      <li class="breadcrumb-item active">
        Crear producto
      </li>
    </ol>

    <section class="form-card">
      <h2>Datos del producto</h2>

      <form class="product-form" (ngSubmit)="addProduct()" enctype="multipart/form-data">

        <input type="hidden" [(ngModel)]="id" name="id">

        <div class="form-group">
          <label for="category">Categoría</label>
          <select
            id="category"
            class="form-select"
            [(ngModel)]="categoryId"
            name="category"
            required>
            <option value="" disabled selected>
              Seleccione una categoría
            </option>
            <option
              *ngFor="let categoria of categories"
              [value]="categoria.id">
              {{ categoria.name }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label for="nombre">Nombre del producto</label>
          <input
            [(ngModel)]="name"
            type="text"
            class="form-control"
            id="nombre"
            name="nombre"
            placeholder="Ejemplo: Osito didáctico IsaBlue"
            autocomplete="off"
            required>
        </div>

        <div class="form-group">
          <label for="descripcion">Descripción</label>
          <textarea
            [(ngModel)]="description"
            class="form-control"
            id="descripcion"
            name="descripcion"
            rows="4"
            placeholder="Describe el juguete, edad recomendada, material o beneficio educativo..."
            autocomplete="off"
            required>
          </textarea>
        </div>

        <div class="form-group">
          <label for="precio">Precio</label>
          <div class="price-input">
            <span>S/</span>
            <input
              [(ngModel)]="price"
              type="number"
              class="form-control"
              step="any"
              min="0"
              id="precio"
              name="precio"
              placeholder="0.00"
              autocomplete="off"
              required>
          </div>
        </div>

        <div class="form-group">
          <label for="img">Imagen del producto</label>
          <input
            type="file"
            class="form-control"
            id="img"
            name="img"
            accept="image/*"
            (change)="onFileSelected($event)">
          <small>Formatos recomendados: JPG, PNG o WEBP.</small>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-save">
            Guardar producto
          </button>

          <a routerLink="/admin/product" class="btn btn-cancel">
            Cancelar
          </a>
        </div>

      </form>
    </section>

  </div>
</main>
