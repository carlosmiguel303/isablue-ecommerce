# Perfil de PRUEBAS — base de datos H2 en memoria.
# No toca MySQL/PostgreSQL ni credenciales reales: permite que `mvn test`
# levante el contexto de Spring sin depender de una base de datos externa.
spring.datasource.url=jdbc:h2:mem:isablue-test;DB_CLOSE_DELAY=-1;MODE=LEGACY
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Secreto solo para pruebas (>= 64 caracteres, exigido por JWTGenerator). No es un secreto real.
jwt.secret=test-secret-solo-para-pruebas-unitarias-no-usar-en-produccion-1234567890
jwt.expiration-ms=1500000

# Sin datos demo para que el contexto de prueba sea determinista.
app.demo-data.enabled=false

# PayPal en modo sandbox con credenciales vacías (PaypalConfig exige estas claves).
paypal.mode=sandbox
paypal.client.id=test
paypal.client.secret=test
app.payment.currency=PEN

app.cors.allowed-origins=http://localhost:4200
