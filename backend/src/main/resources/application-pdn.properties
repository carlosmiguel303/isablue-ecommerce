server.port=${PORT:8080}
jwt.secret=${JWT_SECRET}

spring.datasource.url=${DATABASE_URL:jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/${MYSQL_DATABASE}?useSSL=true&serverTimezone=America/Lima&characterEncoding=UTF-8}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.demo-data.enabled=${DEMO_DATA_ENABLED:false}

paypal.mode=${PAYPAL_MODE:sandbox}
paypal.client.id=${PAYPAL_CLIENT_ID}
paypal.client.secret=${PAYPAL_CLIENT_SECRET}
app.payment.currency=${PAYMENT_CURRENCY:USD}
