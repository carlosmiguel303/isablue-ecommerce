server.port=${PORT:8080}
# El secreto JWT DEBE llegar por variable de entorno. Sin valor por defecto:
# si falta, la aplicación no arranca (JWTGenerator exige >= 64 caracteres).
# IMPORTANTE antes de desplegar: configurar JWT_SECRET en Railway con el MISMO
# valor vigente para no invalidar las sesiones activas (no rotar todavía).
jwt.secret=${JWT_SECRET:}

# PostgreSQL (Railway). Usa las variables del servicio Postgres (PGHOST, PGPORT, ...).
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:railway}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

# Liberar conexiones a Postgres cuando no hay actividad, para que el backend
# pueda "dormirse" en modo Serverless de Railway (sin tráfico saliente).
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.keepalive-time=0
spring.datasource.hikari.max-lifetime=120000
spring.jpa.show-sql=false
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Sin URL productiva quemada: configurar CORS_ALLOWED_ORIGINS en Railway
# (obligatorio; si falta, el frontend quedará bloqueado por CORS).
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}
app.demo-data.enabled=${DEMO_DATA_ENABLED:false}

paypal.mode=${PAYPAL_MODE:sandbox}
paypal.client.id=${PAYPAL_CLIENT_ID:}
paypal.client.secret=${PAYPAL_CLIENT_SECRET:}
app.payment.currency=${PAYMENT_CURRENCY:PEN}
