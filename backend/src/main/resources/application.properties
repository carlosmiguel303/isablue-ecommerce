spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

jwt.secret=${JWT_SECRET:desarrollo-local-cambiar-por-una-clave-segura-de-al-menos-64-caracteres-1234567890}
jwt.expiration-ms=${JWT_EXPIRATION_MS:1500000}

app.frontend.url=${FRONTEND_URL:http://localhost:4200}
app.backend.base-url=${BACKEND_BASE_URL:http://localhost:8085}
app.upload-dir=${UPLOAD_DIR:uploads}
# Datos demo: desactivados por defecto. Los perfiles local/dev los activan explĂ­citamente.
# Si se activan sin definir correo Y contraseĂ±a, el inicializador no crea usuarios.
app.demo-data.enabled=${DEMO_DATA_ENABLED:false}
app.demo.admin.email=${DEMO_ADMIN_EMAIL:}
app.demo.admin.password=${DEMO_ADMIN_PASSWORD:}
app.demo.user.email=${DEMO_USER_EMAIL:}
app.demo.user.password=${DEMO_USER_PASSWORD:}
app.payment.currency=${PAYMENT_CURRENCY:USD}

# Pagos en lĂ­nea (PayPal/Culqi). Desactivados por defecto: el flujo productivo es
# Yape + WhatsApp con confirmaciĂłn manual. Los endpoints responden de forma
# controlada (409) cuando el mĂłdulo estĂˇ apagado.
payments.online.enabled=${PAYMENTS_ONLINE_ENABLED:false}
# Cargo de tarjeta SIMULADO (sin llaves Culqi). Solo para demos locales; jamĂˇs en producciĂłn.
payments.simulated-card.enabled=${PAYMENTS_SIMULATED_CARD_ENABLED:false}

# Identidad de la tienda (sin valores personales quemados; ver README_DEPLOY).
