spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

jwt.secret=${JWT_SECRET:desarrollo-local-cambiar-por-una-clave-segura-de-al-menos-64-caracteres-1234567890}
jwt.expiration-ms=${JWT_EXPIRATION_MS:1500000}

app.frontend.url=${FRONTEND_URL:http://localhost:4200}
app.backend.base-url=${BACKEND_BASE_URL:http://localhost:8085}
app.upload-dir=${UPLOAD_DIR:uploads}
app.demo-data.enabled=${DEMO_DATA_ENABLED:true}
app.demo.admin.email=${DEMO_ADMIN_EMAIL:admin@isablue.pe}
app.demo.admin.password=${DEMO_ADMIN_PASSWORD:admin123}
app.demo.user.email=${DEMO_USER_EMAIL:cliente@isablue.pe}
app.demo.user.password=${DEMO_USER_PASSWORD:cliente123}
app.payment.currency=${PAYMENT_CURRENCY:USD}

# Permitir subir fotos de productos de tamaño normal (hasta 10 MB)
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:12MB}

# SMTP para enviar copia de la boleta al correo del admin (vacío = desactivado)
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:false}
spring.mail.properties.mail.smtp.connectiontimeout=8000
spring.mail.properties.mail.smtp.timeout=8000
spring.mail.properties.mail.smtp.writetimeout=8000
mail.admin.to=${MAIL_ADMIN_TO:}

# Brevo (envío de correo por API HTTP — funciona en Railway)
brevo.api-key=${BREVO_API_KEY:}
mail.from.name=${MAIL_FROM_NAME:Isablue Juguetes}

# Google Sign-In (Client ID de Google Cloud)
google.client-id=${GOOGLE_CLIENT_ID:}

# Culqi (tarjeta) — vacío = modo prueba (simulado)
culqi.public-key=${CULQI_PUBLIC_KEY:}
culqi.secret-key=${CULQI_SECRET_KEY:}

# Nubefact (boleta SUNAT) — vacío = boleta interna
nubefact.url=${NUBEFACT_URL:}
nubefact.token=${NUBEFACT_TOKEN:}

# Yape (pago manual)
yape.number=${YAPE_NUMBER:985436488}
yape.name=${YAPE_NAME:Haydee Hospinal}
