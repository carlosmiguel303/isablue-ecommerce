# SMTP para enviar copia de la boleta al correo del admin (vacĂ­o = desactivado)
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
