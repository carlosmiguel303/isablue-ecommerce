server.port=${PORT:8085}

spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/isablue?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Lima&characterEncoding=UTF-8}
spring.datasource.username=${DATABASE_USERNAME:isablue}
spring.datasource.password=${DATABASE_PASSWORD:isablue_dev}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}

# Desarrollo: datos demo activados explícitamente (antes venían del default global).
app.demo-data.enabled=${DEMO_DATA_ENABLED:true}
app.demo.admin.email=${DEMO_ADMIN_EMAIL:admin@demo.local}
app.demo.admin.password=${DEMO_ADMIN_PASSWORD:admin123}
app.demo.user.email=${DEMO_USER_EMAIL:cliente@demo.local}
app.demo.user.password=${DEMO_USER_PASSWORD:cliente123}
yape.number=${YAPE_NUMBER:999999999}
yape.name=${YAPE_NAME:Tienda Demo}
store.whatsapp=${STORE_WHATSAPP:51999999999}

paypal.mode=${PAYPAL_MODE:sandbox}
paypal.client.id=${PAYPAL_CLIENT_ID:}
paypal.client.secret=${PAYPAL_CLIENT_SECRET:}
