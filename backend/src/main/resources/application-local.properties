# Perfil LOCAL / SANDBOX — base de datos H2 en archivo (sin instalar MySQL).
# Para producción se usa el perfil "dev"/"pdn" con MySQL.
server.port=${PORT:8085}

spring.datasource.url=jdbc:h2:file:./data/isablue;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}

# Culqi (sandbox) — se completan con llaves de prueba
culqi.secret-key=${CULQI_SECRET_KEY:}
culqi.public-key=${CULQI_PUBLIC_KEY:}

# Nubefact (sandbox) — se completan con credenciales de prueba
nubefact.url=${NUBEFACT_URL:}
nubefact.token=${NUBEFACT_TOKEN:}

paypal.mode=${PAYPAL_MODE:sandbox}
paypal.client.id=${PAYPAL_CLIENT_ID:}
paypal.client.secret=${PAYPAL_CLIENT_SECRET:}
