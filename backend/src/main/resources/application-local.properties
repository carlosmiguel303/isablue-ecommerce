# Perfil LOCAL / SANDBOX — base de datos H2 en archivo (sin instalar MySQL).
# Para producción se usa el perfil "dev"/"pdn" con MySQL.
server.port=${PORT:8085}

spring.datasource.url=jdbc:h2:file:./data/isablue;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}

# Sandbox local: datos demo y cargo simulado SOLO en este perfil.
app.demo-data.enabled=${DEMO_DATA_ENABLED:true}
app.demo.admin.email=${DEMO_ADMIN_EMAIL:admin@demo.local}
app.demo.admin.password=${DEMO_ADMIN_PASSWORD:admin123}
app.demo.user.email=${DEMO_USER_EMAIL:cliente@demo.local}
app.demo.user.password=${DEMO_USER_PASSWORD:cliente123}
payments.simulated-card.enabled=${PAYMENTS_SIMULATED_CARD_ENABLED:true}

# Datos ficticios de pago/contacto para el sandbox local (no son datos reales).
yape.number=${YAPE_NUMBER:999999999}
yape.name=${YAPE_NAME:Tienda Demo}
store.whatsapp=${STORE_WHATSAPP:51999999999}

# Culqi (sandbox) — se completan con llaves de prueba
culqi.secret-key=${CULQI_SECRET_KEY:}
culqi.public-key=${CULQI_PUBLIC_KEY:}

# Nubefact (sandbox) — se completan con credenciales de prueba
nubefact.url=${NUBEFACT_URL:}
nubefact.token=${NUBEFACT_TOKEN:}

paypal.mode=${PAYPAL_MODE:sandbox}
paypal.client.id=${PAYPAL_CLIENT_ID:}
paypal.client.secret=${PAYPAL_CLIENT_SECRET:}
